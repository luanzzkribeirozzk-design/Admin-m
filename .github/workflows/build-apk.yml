name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configurar Java (necessario para o Gradle)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar dependencias
        run: npm install

      - name: Adicionar plataforma Android (gera pasta android/)
        run: npx cap add android

      - name: Sincronizar arquivos web com o projeto Android
        run: npx cap sync android

      - name: Dar permissao de execucao ao gradlew
        run: chmod +x android/gradlew

      - name: Compilar APK (debug)
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Enviar APK como artefato
        uses: actions/upload-artifact@v4
        with:
          name: admin-panel-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
