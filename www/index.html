<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#03080F">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#03080F;--bg2:#061018;--bg3:#091520;--bg4:#0C1E2E;
  --neon:#00C8FF;--neon2:#0090BF;--neon3:#00405A;--neon4:#001E2A;
  --tx:#FFFFFF;--t2:#6AAAC8;--t3:#2A5570;
  --red:#FF3A5C;--grn:#00E87A;--yw:#FFB800;
  --ff:'Inter',system-ui,sans-serif;
  --r:16px;--r2:10px;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--ff);overflow:hidden;}
input,button{font-family:var(--ff);}
.page{display:none;height:100vh;overflow-y:auto;overflow-x:hidden;padding-bottom:80px;max-width:100vw;}
.page.on{display:block;}

/* HEADER */
.hdr{position:sticky;top:0;z-index:90;
  background:rgba(3,8,15,.94);backdrop-filter:blur(16px);
  padding:12px 16px;display:flex;align-items:center;gap:10px;}
.hdr::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon3),transparent);}
.hdr-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--neon),var(--neon2));
  display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:17px;color:#000;
  box-shadow:0 0 14px rgba(0,200,255,.35);}
.hdr-info{flex:1;min-width:0;}
.hdr-name{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hdr-role{font-size:9px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;margin-top:1px;}
.cr-badge{background:linear-gradient(135deg,var(--neon4),#001828);
  border:1.5px solid var(--neon3);border-radius:20px;
  padding:5px 14px;font-size:12px;font-weight:800;
  color:var(--neon);white-space:nowrap;flex-shrink:0;
  box-shadow:0 0 8px rgba(0,200,255,.12);}
.logout-btn{width:36px;height:36px;border-radius:10px;
  background:rgba(255,58,92,.07);border:1px solid rgba(255,58,92,.2);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;color:var(--red);}
.logout-btn:active{background:rgba(255,58,92,.18);}

/* NAV */
.nav{position:fixed;bottom:0;left:0;right:0;z-index:90;
  background:rgba(3,8,15,.97);backdrop-filter:blur(16px);
  border-top:1px solid var(--neon4);display:flex;}
.nav-btn{flex:1;padding:10px 4px 9px;display:flex;flex-direction:column;
  align-items:center;gap:3px;cursor:pointer;color:var(--t3);
  font-size:9px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;
  position:relative;transition:color .2s;}
.nav-btn.on{color:var(--neon);}
.nav-btn.on::before{content:'';position:absolute;top:0;left:25%;right:25%;
  height:2px;background:var(--neon);border-radius:0 0 4px 4px;
  box-shadow:0 0 8px var(--neon);}
.nav-btn svg{width:20px;height:20px;stroke-width:1.8;}

/* CARD */
.card{margin:14px 14px 0;background:linear-gradient(160deg,var(--bg2),var(--bg3));
  border:1px solid var(--neon4);border-radius:var(--r);overflow:hidden;
  box-shadow:0 4px 24px rgba(0,0,0,.5);}
.card-hdr{padding:13px 15px;display:flex;align-items:center;gap:9px;
  border-bottom:1px solid var(--neon4);}
.card-bar{width:3px;height:18px;border-radius:2px;
  background:linear-gradient(to bottom,var(--neon),var(--neon2));
  box-shadow:0 0 8px rgba(0,200,255,.4);flex-shrink:0;}
.card-title{font-weight:700;font-size:13px;letter-spacing:.3px;}
.card-body{padding:15px;}

/* FORM */
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:10px;font-weight:700;color:var(--t2);
  letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;}
.fi{width:100%;background:var(--bg4);border:1.5px solid var(--neon4);
  border-radius:var(--r2);padding:11px 13px;color:var(--tx);font-size:14px;
  outline:none;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.fi:focus{border-color:var(--neon);box-shadow:0 0 0 3px rgba(0,200,255,.09);}
.fi::placeholder{color:var(--t3);}

/* PRESETS */
.presets{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:14px;}
.preset{padding:10px 4px;border-radius:10px;border:1.5px solid var(--neon4);
  background:transparent;color:var(--t2);font-size:12px;font-weight:700;
  cursor:pointer;text-align:center;transition:all .2s;}
.preset.on{border-color:var(--neon);color:var(--neon);
  background:rgba(0,200,255,.08);box-shadow:0 0 10px rgba(0,200,255,.12);}
.preset:active{opacity:.7;}

/* STEPPER */
.stepper{display:flex;align-items:center;border:1.5px solid var(--neon4);
  border-radius:var(--r2);overflow:hidden;background:var(--bg4);}
.step-btn{width:46px;height:44px;background:transparent;border:none;
  color:var(--neon);font-size:22px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:background .2s;}
.step-btn:active{background:rgba(0,200,255,.1);}
.step-val{flex:1;text-align:center;font-size:18px;font-weight:800;color:var(--tx);}

/* CR PREVIEW */
.cr-preview{background:rgba(0,200,255,.06);border:1px solid var(--neon3);
  border-radius:var(--r2);padding:10px 13px;margin-bottom:14px;
  display:flex;justify-content:space-between;align-items:center;}
.cr-preview-lbl{font-size:10px;color:var(--t2);font-weight:700;letter-spacing:.8px;text-transform:uppercase;}
.cr-preview-val{font-size:15px;font-weight:800;color:var(--neon);}

/* BUTTONS */
.btn{width:100%;padding:14px;border-radius:var(--r2);border:none;
  font-size:14px;font-weight:800;cursor:pointer;transition:all .2s;
  letter-spacing:.5px;text-transform:uppercase;}
.btn-neon{background:linear-gradient(135deg,var(--neon2),var(--neon));
  color:#000;box-shadow:0 4px 18px rgba(0,200,255,.25);}
.btn-neon:active{opacity:.85;transform:scale(.98);}
.btn-out{background:transparent;border:1.5px solid var(--neon3);
  color:var(--neon);margin-top:10px;}
.btn-out:active{background:rgba(0,200,255,.07);}
.btn-sm{padding:5px 11px;border-radius:7px;border:none;font-size:10px;font-weight:700;cursor:pointer;}
.btn-g{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.25);color:var(--grn);}
.btn-r{background:rgba(255,58,92,.1);border:1px solid rgba(255,58,92,.25);color:var(--red);}
.btn-y{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.25);color:var(--yw);}
.btn-b{background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.25);color:var(--neon);}

/* RESULT */
.rbox{background:var(--neon4);border:1.5px solid var(--neon3);
  border-radius:var(--r);padding:15px;margin-top:14px;display:none;}
.rbox.on{display:block;}
.rbox-title{font-size:10px;font-weight:700;color:var(--t2);letter-spacing:1px;
  text-transform:uppercase;margin-bottom:10px;}
.rbox-text{font-family:'Courier New',monospace;font-size:12px;color:var(--tx);
  line-height:1.8;word-break:break-all;white-space:pre-wrap;}
.rbox-text .lbl{color:var(--t2);}
.rbox-text .val{color:var(--neon);font-weight:700;}

/* KEYS LIST */
.km{font-size:11px;color:var(--t2);padding:10px 14px;font-weight:600;}
.kl{padding:0 14px;max-width:100vw;box-sizing:border-box;}
.key-card{background:linear-gradient(160deg,var(--bg2),var(--bg3));
  border:1px solid var(--neon4);border-radius:var(--r);
  padding:13px;margin-bottom:10px;max-width:100%;box-sizing:border-box;overflow:hidden;}
.key-top{margin-bottom:9px;}
.key-user{word-break:break-word;overflow-wrap:anywhere;}
.key-user{font-weight:800;font-size:14px;}
.key-pass{font-size:11px;color:var(--t2);margin-top:2px;}
.key-str{background:var(--bg);border-radius:8px;padding:9px 11px;
  font-family:'Courier New',monospace;font-size:11px;color:var(--neon);
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:9px;gap:8px;border:1px solid var(--neon4);}
.key-str span{word-break:break-all;}
.key-meta{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;}
.tag{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;}
.tg{background:rgba(0,232,122,.1);border:1px solid rgba(0,232,122,.25);color:var(--grn);}
.tr{background:rgba(255,58,92,.1);border:1px solid rgba(255,58,92,.25);color:var(--red);}
.ty{background:rgba(255,184,0,.1);border:1px solid rgba(255,184,0,.25);color:var(--yw);}
.tb{background:rgba(0,200,255,.1);border:1px solid rgba(0,200,255,.25);color:var(--neon);}
.tn{background:var(--bg3);border:1px solid var(--neon4);color:var(--t2);}
.key-dev{font-size:10px;color:var(--t3);margin-bottom:9px;}
.key-acts{display:flex;gap:8px;flex-wrap:wrap;}
.search-wrap{margin:12px 14px 0;position:relative;}
.search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);
  color:var(--t3);width:15px;height:15px;}
.search-wrap input{padding-left:34px;}

/* STATS */
.stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 14px 0;}
.stat{background:linear-gradient(135deg,var(--bg2),var(--bg3));
  border:1px solid var(--neon4);border-radius:var(--r);padding:14px;text-align:center;}
.stat-n{font-size:28px;font-weight:800;color:var(--neon);
  text-shadow:0 0 14px rgba(0,200,255,.35);}
.stat-l{font-size:10px;color:var(--t2);margin-top:4px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;}

/* INFO */
.info-row{display:flex;justify-content:space-between;align-items:center;
  padding:11px 0;border-bottom:1px solid var(--neon4);}
.info-row:last-child{border:none;}
.info-lbl{font-size:11px;color:var(--t2);font-weight:600;}
.info-val{font-size:13px;font-weight:800;}

/* LOGIN */
#lg{display:flex;align-items:center;justify-content:center;
  min-height:100vh;padding:28px 20px;background:var(--bg);}
.lg-box{width:100%;max-width:340px;}
.lg-logo{text-align:center;margin-bottom:36px;}
.lg-icon{width:62px;height:62px;border-radius:18px;margin:0 auto 16px;
  background:linear-gradient(135deg,var(--neon2),var(--neon));
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 24px rgba(0,200,255,.35);}
.lg-icon svg{width:28px;height:28px;stroke:white;stroke-width:2.2;fill:none;}
.lg-title{font-size:24px;font-weight:800;color:var(--tx);letter-spacing:-.5px;}
.lg-sub{font-size:12px;color:var(--t2);margin-top:6px;}
.lg-err{color:var(--red);font-size:12px;margin-bottom:12px;display:none;
  padding:9px 12px;background:rgba(255,58,92,.07);
  border-radius:10px;border:1px solid rgba(255,58,92,.2);}
.rem-row{display:flex;align-items:center;gap:8px;margin-bottom:18px;}
.rem-row label{font-size:12px;color:var(--t2);cursor:pointer;}
input[type=checkbox]{accent-color:var(--neon);width:15px;height:15px;cursor:pointer;}

/* TOAST */
#toast{position:fixed;bottom:88px;left:50%;transform:translateX(-50%);
  background:var(--bg2);border-radius:24px;padding:9px 20px;
  font-size:12px;font-weight:700;opacity:0;pointer-events:none;
  transition:opacity .25s;z-index:999;white-space:nowrap;
  border:1px solid var(--neon4);box-shadow:0 4px 16px rgba(0,0,0,.5);}
#toast.on{opacity:1;}
#toast.ok{border-color:rgba(0,232,122,.4);color:var(--grn);}
#toast.er{border-color:rgba(255,58,92,.4);color:var(--red);}
#toast.inf{border-color:var(--neon3);color:var(--neon);}

/* LOADING */
#ls{position:fixed;inset:0;background:var(--bg);z-index:999;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;
  transition:opacity .4s;}
#ls.hide{opacity:0;}
.spin{width:40px;height:40px;border:3px solid var(--neon4);
  border-top-color:var(--neon);border-radius:50%;animation:sp .8s linear infinite;
  box-shadow:0 0 12px rgba(0,200,255,.2);}
@keyframes sp{to{transform:rotate(360deg);}}
.ld-t{font-size:11px;color:var(--t2);letter-spacing:2px;text-transform:uppercase;}
.empty{text-align:center;padding:40px 20px;color:var(--t3);font-size:13px;}

/* AMBIENT GLOW ORBS */
.orb{position:fixed;border-radius:50%;filter:blur(60px);pointer-events:none;z-index:0;opacity:.35;}
.orb1{width:260px;height:260px;top:-80px;right:-60px;background:radial-gradient(circle,var(--neon),transparent 70%);}
.orb2{width:220px;height:220px;bottom:60px;left:-70px;background:radial-gradient(circle,#7A2CFF,transparent 70%);opacity:.22;}
.hdr,.page,.nav,.lg-box{position:relative;z-index:1;}

/* PAGE TRANSITION */
.page.on{animation:pgIn .28s ease;}
@keyframes pgIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* MASS ACTIONS BAR */
.mass-bar{display:flex;gap:8px;margin:12px 14px 0;}
.mass-bar .btn-sm{flex:1;padding:9px 6px;font-size:10.5px;letter-spacing:.4px;text-transform:uppercase;}

/* DEVICE LOCK ICON */
.dev-row{margin-bottom:9px;font-size:10px;color:var(--t3);word-break:break-word;overflow-wrap:anywhere;}
.dev-row svg{width:12px;height:12px;vertical-align:-2px;margin-right:6px;}
.dev-row.bound{color:var(--t2);}
.dev-row.bound svg{color:var(--neon);}

/* STAT ICON ACCENT */
.stat{position:relative;overflow:hidden;}
.stat::after{content:'';position:absolute;top:-30%;right:-20%;width:70px;height:70px;
  background:radial-gradient(circle,rgba(0,200,255,.1),transparent 70%);border-radius:50%;}
</style>
</head>
<body>

<div id="ls" class="hide" style="display: none;">
  <div style="font-size:20px;font-weight:800;color:var(--neon);letter-spacing:2px;text-shadow:0 0 16px rgba(0,200,255,.5);">ADMIN PANEL</div>
  <div class="spin"></div>
  <div class="ld-t">Carregando</div>
</div>

<div id="lg">
  <div class="orb orb1"></div><div class="orb orb2"></div>
  <div class="lg-box">
    <div class="lg-logo">
      <div class="lg-icon">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
      </div>
      <div class="lg-title">Admin Panel</div>
      <div class="lg-sub">Gerenciamento de licencas</div>
    </div>
    <div class="lg-err" id="lerr"></div>
    <div class="fg">
      <label>Usuario</label>
      <input class="fi" id="lu" placeholder="seu usuario" autocomplete="off" autocapitalize="off">
    </div>
    <div class="fg">
      <label>Senha</label>
      <input class="fi" id="lp" type="password" placeholder="sua senha">
    </div>
    <div class="rem-row">
      <input type="checkbox" id="rem">
      <label for="rem">Lembrar login</label>
    </div>
    <button class="btn btn-neon" onclick="doLogin()">ENTRAR</button>
  </div>
</div>

<div id="app" style="display:none;flex-direction:column;height:100%;">
  <div class="orb orb1"></div><div class="orb orb2"></div>

  <div class="hdr">
    <div class="hdr-av" id="u-av">A</div>
    <div class="hdr-info">
      <div class="hdr-name" id="u-nm">Admin</div>
      <div class="hdr-role">ADMIN</div>
    </div>
    <div class="cr-badge" id="top-cr">0 cr</div>
    <div class="logout-btn" onclick="doLogout()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
        <polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line>
      </svg>
    </div>
  </div>

  <!-- GERAR -->
  <div class="page on" id="pg-gerar">
    <div class="card" style="margin-top:14px;">
      <div class="card-hdr"><div class="card-bar"></div><div class="card-title">Duracao da Key</div></div>
      <div class="card-body">
        <div class="fg">
          <label>Atalhos rapidos</label>
          <div class="presets">
            <button class="preset" onclick="setDias(1)">1d</button>
            <button class="preset" onclick="setDias(7)">7d</button>
            <button class="preset" onclick="setDias(15)">15d</button>
            <button class="preset" onclick="setDias(30)">30d</button>
          </div>
        </div>
        <div class="fg">
          <label>Quantos dias?</label>
          <input class="fi" id="dur-d" type="number" min="1" max="365" placeholder="ex: 7" oninput="clearPreset();updCr()">
        </div>
        <div class="fg">
          <label>Quantidade de keys</label>
          <div class="stepper">
            <button class="step-btn" onclick="changeQtd(-1)">-</button>
            <div class="step-val" id="qtd-val">1</div>
            <button class="step-btn" onclick="changeQtd(1)">+</button>
          </div>
        </div>
        <div class="cr-preview">
          <span class="cr-preview-lbl">Creditos necessarios</span>
          <span class="cr-preview-val" id="cr-need">— cr</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-hdr"><div class="card-bar"></div><div class="card-title">Gerar Key</div></div>
      <div class="card-body">
        <div class="fg">
          <label>Prefixo da Key</label>
          <input class="fi" id="kprefix" placeholder="xxxx-xxxx" autocapitalize="characters" autocomplete="off" oninput="savePrefix()">
        </div>
        <button class="btn btn-neon" onclick="genKey()">GERAR KEY</button>

        <div class="rbox" id="rbox">
          <div class="rbox-title">Keys geradas</div>
          <div class="rbox-text" id="rbox-text"></div>
          <button class="btn btn-out" id="cpbtn" onclick="cpKey()">COPIAR</button>
        </div>
      </div>
    </div>
  </div>

  <!-- KEYS -->
  <div class="page" id="pg-keys">
    <div class="search-wrap" style="margin-top:14px;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
      <input class="fi" id="qk" placeholder="Buscar key..." oninput="renderKeys()">
    </div>
    <div class="mass-bar">
      <button class="btn-sm btn-y" onclick="toggleAllStatus('p')">Pausar Todas</button>
      <button class="btn-sm btn-g" onclick="toggleAllStatus('u')">Ativar Todas</button>
    </div>
    <div class="km" id="km">0 keys</div>
    <div class="kl" id="kl"></div>
  </div>

  <!-- CONTA -->
  <div class="page" id="pg-conta">
    <div class="stats">
      <div class="stat"><div class="stat-n" id="s-cr">0</div><div class="stat-l">Creditos</div></div>
      <div class="stat"><div class="stat-n" id="s-keys">0</div><div class="stat-l">Geradas</div></div>
      <div class="stat"><div class="stat-n" id="s-used">0</div><div class="stat-l">Cr Usados</div></div>
      <div class="stat"><div class="stat-n" id="s-at">0</div><div class="stat-l">Ativas</div></div>
    </div>
    <div class="card">
      <div class="card-hdr"><div class="card-bar"></div><div class="card-title">Minha Conta</div></div>
      <div class="card-body">
        <div class="info-row"><span class="info-lbl">Usuario</span><span class="info-val" id="inf-u">—</span></div>
        <div class="info-row"><span class="info-lbl">Senha</span><span class="info-val" id="inf-p">—</span></div>
        <div class="info-row"><span class="info-lbl">Creditos</span><span class="info-val" id="inf-cr">0</span></div>
        <div class="info-row"><span class="info-lbl">Status</span><span class="info-val" id="inf-st">—</span></div>
      </div>
    </div>
    <div style="padding:0 14px 14px;">
      <button class="btn" style="background:rgba(255,58,92,.08);border:1.5px solid rgba(255,58,92,.2);color:var(--red);" onclick="doLogout()">Sair da Conta</button>
    </div>
  </div>

  <div class="nav">
    <div class="nav-btn on" id="nav-gerar" onclick="goPage('gerar')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="3" y="3" width="7" height="7" rx="1.5"></rect><rect x="14" y="3" width="7" height="7" rx="1.5"></rect><rect x="3" y="14" width="7" height="7" rx="1.5"></rect><rect x="14" y="14" width="7" height="7" rx="1.5"></rect></svg>
      GERAR
    </div>
    <div class="nav-btn" id="nav-keys" onclick="goPage('keys')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"></path></svg>
      KEYS
    </div>
    <div class="nav-btn" id="nav-conta" onclick="goPage('conta')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
      CONTA
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<script>
(function(){
  document.addEventListener('contextmenu',e=>e.preventDefault());
  document.addEventListener('keydown',e=>{
    if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C','K'].includes(e.key))||(e.ctrlKey&&['U','S'].includes(e.key)))e.preventDefault();
  });
  setInterval(()=>{
    if(window.outerWidth-window.innerWidth>160||window.outerHeight-window.innerHeight>160){document.body.innerHTML='';location.href='about:blank';}
  },1000);
})();

const $=id=>document.getElementById(id);
firebase.initializeApp({apiKey:"AIzaSyAmXzPrNaK_-Zr190oB8MuxA_sqI_ctetc",authDomain:"principal-6bf6f.firebaseapp.com",projectId:"principal-6bf6f",storageBucket:"principal-6bf6f.firebasestorage.app",messagingSenderId:"395455567534",appId:"1:395455567534:android:5f62c80b91c83b7c0cc01b"});
const db=firebase.firestore();

let me=null,MK={},qtd=1,lastResult='';

window.addEventListener('DOMContentLoaded',()=>{
  const s=JSON.parse(localStorage.getItem('rxadmin')||'null');
  if(s){$('lu').value=s.u;$('lp').value=s.p;$('rem').checked=true;}
  const pfx=localStorage.getItem('rxprefix');
  if(pfx)$('kprefix').value=pfx;
  if('serviceWorker' in navigator){
    window.addEventListener('load',()=>{
      navigator.serviceWorker.register('service-worker.js').catch(()=>{});
    });
  }
  setTimeout(()=>{const ls=$('ls');ls.classList.add('hide');setTimeout(()=>ls.style.display='none',400);},700);
});

function savePrefix(){
  const v=$('kprefix').value.trim().toUpperCase();
  if(v)localStorage.setItem('rxprefix',v);
  else localStorage.removeItem('rxprefix');
}

async function doLogin(){
  const u=$('lu').value.trim(),p=$('lp').value.trim();
  if(!u||!p){showE('Preencha os campos');return;}
  try{
    const sn=await db.collection('admins').doc(u).get();
    if(!sn.exists){showE('Usuario nao encontrado');return;}
    const d=sn.data();
    if(d.pass!==p){showE('Senha incorreta');return;}
    if(d.status==='paused'){showE('Conta pausada');return;}
    if($('rem').checked)localStorage.setItem('rxadmin',JSON.stringify({u,p}));
    else localStorage.removeItem('rxadmin');
    me={id:u,...d};
    $('lg').style.display='none';
    $('app').style.display='flex';
    boot();
  }catch(e){showE('Erro: '+e.message);}
}
function showE(m){const el=$('lerr');el.textContent=m;el.style.display='block';}
function doLogout(){localStorage.removeItem('rxadmin');location.reload();}

function boot(){
  sync();
  db.collection('admins').doc(me.id).onSnapshot(s=>{if(s.exists){me={id:me.id,...s.data()};sync();}});
  db.collection('keys').onSnapshot(s=>{
    MK={};
    s.forEach(d=>{const k={id:d.id,...d.data()};if(k.generatedBy===me.id)MK[d.id]=k;});
    sync();renderKeys();
  });
}

function sync(){
  const cr=me.credits??0;
  $('top-cr').textContent=cr+' cr';
  $('u-nm').textContent=me.id;
  $('u-av').textContent=me.id[0].toUpperCase();
  $('inf-u').textContent=me.id;
  $('inf-p').textContent=me.pass||'—';
  $('inf-cr').textContent=cr;
  const at=me.status==='active';
  $('inf-st').textContent=at?'Ativa':'Pausada';
  $('inf-st').style.color=at?'var(--grn)':'var(--yw)';
  $('s-cr').textContent=cr;
  $('s-keys').textContent=me.keysGenerated??0;
  $('s-used').textContent=me.creditsUsed??0;
  $('s-at').textContent=Object.values(MK).filter(k=>k.status==='active').length;
  updCr();
}

function goPage(p){
  ['gerar','keys','conta'].forEach(x=>{
    $('pg-'+x).classList.toggle('on',x===p);
    $('nav-'+x).classList.toggle('on',x===p);
  });
  if(p==='keys')renderKeys();
}

// DIAS
function setDias(d){$('dur-d').value=d;document.querySelectorAll('.preset').forEach((el,i)=>el.classList.toggle('on',[1,7,15,30][i]===d));updCr();}
function clearPreset(){document.querySelectorAll('.preset').forEach(el=>el.classList.remove('on'));}
function changeQtd(v){qtd=Math.max(1,Math.min(50,qtd+v));$('qtd-val').textContent=qtd;updCr();}

function calcCr(){
  const d=parseInt($('dur-d')?.value)||0;
  if(!d)return 0;
  return (3+(d-1)*2)*qtd;
}
function updCr(){
  const n=calcCr();
  const el=$('cr-need');
  if(!el)return;
  el.textContent=n?n+' cr':'— cr';
  const cr=me?.credits??0;
  el.style.color=n&&n>cr?'var(--red)':'var(--neon)';
}

// GERAR KEY
function randCode(len=8){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<len;i++)s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}

async function genKey(){
  const d=parseInt($('dur-d').value)||0;
  if(!d){toast('Informe a duracao em dias','er');return;}
  const total=calcCr();
  if((me.credits??0)<total){toast('Creditos insuficientes — precisa '+total+', tem '+(me.credits??0),'er');return;}

  const prefix=($('kprefix').value.trim().toUpperCase())||'KEY';

  const batch=db.batch();
  const geradas=[];

  for(let i=0;i<qtd;i++){
    const ks=`${prefix}-${randCode()}`;
    const kid=`key_${Date.now()}_${i}_${Math.random().toString(36).substr(2,5)}`;
    batch.set(db.collection('keys').doc(kid),{
      keyString:ks,days:d,minutes:0,
      generatedBy:me.id,status:'active',
      deviceId:null,firstUsed:null,pausedAt:null,
      createdAt:firebase.firestore.FieldValue.serverTimestamp()
    });
    geradas.push({k:ks});
  }

  batch.update(db.collection('admins').doc(me.id),{
    credits:(me.credits??0)-total,
    creditsUsed:(me.creditsUsed??0)+total,
    keysGenerated:(me.keysGenerated??0)+qtd
  });

  await batch.commit();

  // Formatar resultado
  let txt='';
  if(qtd===1){
    txt=`KEY  : ${geradas[0].k}\nDAYS : ${d}`;
  } else {
    const keys=geradas.map(g=>g.k).join(' | ');
    txt=`${qtd} KEYS\nKEYS : ${keys}\nDAYS : ${d}`;
  }

  lastResult=txt;
  $('rbox-text').textContent=txt;
  $('rbox').classList.add('on');
  toast('Key gerada com sucesso','ok');
}

function cpKey(){
  cpText(lastResult,'cpbtn');
  toast('Copiado','ok');
}

// RENDER KEYS
function drest(k){
  if(!k.firstUsed)return{t:'Aguardando',c:'tb'};
  const sec=k.status==='paused'&&k.pausedAt?k.pausedAt.seconds-k.firstUsed.seconds:Math.floor(Date.now()/1000)-k.firstUsed.seconds;
  const dur=(k.days||0)*86400+(k.minutes||0)*60;
  if(!dur)return{t:'Sem expiracao',c:'tb'};
  const rem=Math.max(0,dur-sec);
  if(!rem)return{t:'Expirada',c:'tr'};
  if(rem<3600)return{t:Math.floor(rem/60)+'min rest.',c:'ty'};
  if(rem<86400)return{t:Math.floor(rem/3600)+'h rest.',c:'ty'};
  const rd=Math.floor(rem/86400);
  return{t:rd+'d restantes',c:rd<=2?'tr':rd<=5?'ty':'tg'};
}

function renderKeys(){
  const q=($('qk').value||'').toLowerCase();
  let list=Object.values(MK).filter(k=>!q||k.keyString?.toLowerCase().includes(q));
  list.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  $('km').textContent=list.length+' key'+(list.length!==1?'s':'')+' gerada'+(list.length!==1?'s':'');
  if(!list.length){$('kl').innerHTML='<div class="empty">Nenhuma key encontrada</div>';return;}
  $('kl').innerHTML=list.map(k=>{
    const dr=drest(k);
    const sc=k.status==='active'?'tg':k.status==='paused'?'ty':'tr';
    const sl=k.status==='active'?'Ativa':k.status==='paused'?'Pausada':'Inativa';
    const dt=k.createdAt?.seconds?new Date(k.createdAt.seconds*1000).toLocaleDateString('pt-BR'):'—';
    const esc=(k.keyString||'').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    const bound=!!k.deviceId;
    const devTxt=bound?'Vinculada: '+k.deviceId.slice(0,14)+'...':'Sem dispositivo vinculado';
    const lockIcon=bound
      ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>'
      :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></svg>';
    return`<div class="key-card">
      <div class="key-top">
        <div class="key-user">${k.keyString||'—'}</div>
        <div class="key-pass">Criada em ${dt}</div>
      </div>
      <div class="key-meta">
        <span class="tag ${sc}">${sl}</span>
        <span class="tag tb">${k.days||0}d</span>
        <span class="tag ${dr.c}">${dr.t}</span>
      </div>
      <div class="dev-row ${bound?'bound':''}">${lockIcon}<span>${devTxt}</span></div>
      <div class="key-acts">
        <button class="btn-sm btn-b" onclick="cpText('${esc}',this)">Copiar</button>
        ${k.status==='active'
          ?`<button class="btn-sm btn-y" onclick="togK('${k.id}','p')">Pausar</button>`
          :`<button class="btn-sm btn-g" onclick="togK('${k.id}','u')">Ativar</button>`}
        ${bound?`<button class="btn-sm btn-b" onclick="resetDev('${k.id}')">Resetar Dispositivo</button>`:''}
        <button class="btn-sm btn-r" onclick="delK('${k.id}')">Apagar</button>
      </div>
    </div>`;
  }).join('');
}

function resetDev(id){
  if(!confirm('Resetar o dispositivo vinculado a esta key? Ela podera ser usada em outro aparelho no proximo login.'))return;
  db.collection('keys').doc(id).update({deviceId:null});
  toast('Dispositivo resetado','ok');
}

function toggleAllStatus(ac){
  const targets=Object.values(MK).filter(k=>ac==='p'?k.status==='active':k.status==='paused');
  if(!targets.length){toast('Nenhuma key para atualizar','inf');return;}
  if(!confirm(ac==='p'?`Pausar ${targets.length} key(s) ativa(s)?`:`Ativar ${targets.length} key(s) pausada(s)?`))return;
  const batch=db.batch(),now=Math.floor(Date.now()/1000);
  targets.forEach(k=>{
    const u={status:ac==='p'?'paused':'active'};
    if(ac==='p'&&k.firstUsed)u.pausedAt=firebase.firestore.Timestamp.fromMillis(now*1000);
    if(ac==='u'&&k.pausedAt&&k.firstUsed){u.firstUsed=firebase.firestore.Timestamp.fromMillis((k.firstUsed.seconds+(now-k.pausedAt.seconds))*1000);u.pausedAt=null;}
    batch.update(db.collection('keys').doc(k.id),u);
  });
  batch.commit();
  toast(ac==='p'?'Todas as keys pausadas':'Todas as keys ativadas','ok');
}

function togK(id,ac){
  const k=MK[id],now=Math.floor(Date.now()/1000);
  const u={status:ac==='p'?'paused':'active'};
  if(ac==='p'&&k.firstUsed)u.pausedAt=firebase.firestore.Timestamp.fromMillis(now*1000);
  if(ac==='u'&&k.pausedAt&&k.firstUsed){u.firstUsed=firebase.firestore.Timestamp.fromMillis((k.firstUsed.seconds+(now-k.pausedAt.seconds))*1000);u.pausedAt=null;}
  db.collection('keys').doc(id).update(u);
  toast(ac==='p'?'Key pausada':'Key ativada','ok');
}
function delK(id){if(!confirm('Apagar esta key?'))return;db.collection('keys').doc(id).delete();toast('Key apagada','ok');}

function cpText(txt,btn){
  const b=typeof btn==='string'?$(btn):btn;
  const done=()=>{if(!b)return;const o=b.textContent;b.textContent='Copiado';setTimeout(()=>b.textContent=o,1800);};
  if(navigator.clipboard&&window.isSecureContext)navigator.clipboard.writeText(txt).then(done).catch(()=>fbCp(txt,done));
  else fbCp(txt,done);
}
function fbCp(txt,cb){const t=document.createElement('textarea');t.value=txt;t.style.cssText='position:fixed;opacity:0;';document.body.appendChild(t);t.focus();t.select();try{document.execCommand('copy');cb&&cb();}catch(e){}document.body.removeChild(t);}
function toast(msg,t){const el=$('toast');el.textContent=msg;el.className='on '+t;clearTimeout(el._t);el._t=setTimeout(()=>el.className='',2500);}
</script>
